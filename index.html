<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<meta name="theme-color" content="#DB3A4C" />
<title>Q8 · Saat & Gözlük</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="manifest" href="manifest.json" />
<style>
/* ============================================================
   Q8 — Saat & Gözlük  ·  Sibs görsel dili
   ============================================================ */
:root{
  --bg:#F8F7FA;
  --surface:#F4F4F6;
  --card:#FFFFFF;
  --line:#ECECEF;
  --line-2:#E0E0E5;
  --ink:#17171A;        /* başlık */
  --text:#2C2C30;
  --muted:#8A8A8F;
  --faint:#B5B5BA;
  --orange:#DB3A4C;
  --orange-press:#C22A3C;
  --red:#F5402C;
  --grad:linear-gradient(92deg,#E85C6B 0%,#DB3A4C 100%);
  --green:#1FB85A;
  --green-bg:#E9F7EE;
  --black:#0E0E10;
  --yellow:#F5B301;
  --radius:18px;
  --radius-sm:12px;
  --ease:cubic-bezier(.22,.61,.36,1);
  --maxw:520px;
  --nav-h:72px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink)}
body{font-family:"Public Sans",system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
img{display:block;max-width:100%}
::selection{background:var(--orange);color:#fff}

#app{max-width:var(--maxw);margin:0 auto;min-height:100dvh;position:relative;background:var(--bg);
  padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom));}

/* ---------------- SPLASH (siyah, Sibs) ---------------- */
#splash{position:fixed;inset:0;background:var(--black);z-index:1000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
  transition:opacity .5s var(--ease)}
#splash.hide{opacity:0;pointer-events:none}
.splash-mark{font-weight:700;font-size:62px;color:#fff;letter-spacing:-.01em;position:relative;line-height:1}
.splash-mark sup{font-size:18px;font-weight:600;position:absolute;top:6px;right:-22px}
.splash-sub{color:#fff;font-size:20px;font-weight:700;letter-spacing:.01em}
.splash-mark{animation:pop .6s var(--ease) both}
@keyframes pop{from{opacity:0;scale:.9}to{opacity:1;scale:1}}

/* ---------------- TOP BAR ---------------- */
.topbar{position:sticky;top:0;z-index:60;background:rgba(255,255,255,.92);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--line);
  padding-top:env(safe-area-inset-top)}
.topbar-row{display:flex;align-items:center;justify-content:space-between;padding:13px 18px 9px}
.brand{display:flex;align-items:baseline;gap:8px}
.brand .wm{font-weight:700;font-size:23px;letter-spacing:-.01em;color:var(--ink)}
.brand .wm sup{font-size:9px;font-weight:600;color:var(--muted)}
.brand .tag{font-size:10px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
.curr-toggle{display:flex;background:var(--surface);border-radius:30px;padding:3px}
.curr-toggle button{padding:6px 12px;color:var(--muted);font-weight:600;font-size:12px;border-radius:30px}
.curr-toggle button.on{background:var(--orange);color:#fff}
.icon-btn{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;
  background:var(--surface);color:var(--ink);position:relative}
.icon-btn .dot{position:absolute;top:6px;right:7px;width:7px;height:7px;border-radius:50%;background:var(--red)}

.tabs{display:flex;gap:2px;padding:2px 10px 0;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:9px 14px 13px;font-size:16px;font-weight:600;color:var(--muted);position:relative;white-space:nowrap}
.tab.on{color:var(--orange)}

/* ---------------- VIEWS ---------------- */
.view{display:none;animation:fade .3s var(--ease)}
.view.on{display:block}
@keyframes fade{from{opacity:0;translate:0 6px}to{opacity:1;translate:0 0}}
.section-head{display:flex;align-items:baseline;justify-content:space-between;margin:20px 18px 12px}
.section-head h2{margin:0;font-size:20px;font-weight:700;color:var(--ink);letter-spacing:-.01em}
.section-head .count{font-size:13px;color:var(--muted);font-weight:500}

/* promo / recommended card (Sibs) */
.promo{margin:16px 18px 4px;background:var(--surface);border-radius:var(--radius);padding:22px 18px;text-align:center}
.promo p{margin:0 0 14px;color:var(--text);font-size:15px;font-weight:500}
.promo .pbtn{display:inline-block;border:1.5px solid var(--orange);color:var(--orange);font-weight:700;
  padding:11px 22px;border-radius:30px;font-size:14px}
.promo .pbtn:active{scale:.97}

/* FEATURED rail */
.rail{display:flex;gap:13px;overflow-x:auto;padding:2px 18px 6px;scroll-snap-type:x mandatory;scrollbar-width:none}
.rail::-webkit-scrollbar{display:none}
.feat-card{min-width:240px;scroll-snap-align:start;border-radius:var(--radius);overflow:hidden;
  background:var(--card);border:1px solid var(--line)}
.feat-card .ph{aspect-ratio:4/3;background:#fff;object-fit:contain;width:100%}
.feat-meta{padding:12px 13px 14px}
.feat-meta .nm{font-size:14px;font-weight:600;line-height:1.25;color:var(--ink);
  display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
.feat-meta .pr{margin-top:7px;font-weight:700;color:var(--ink);font-size:16px}

/* chips */
.chips{display:flex;gap:9px;overflow-x:auto;padding:14px 18px 4px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{padding:10px 18px;border-radius:30px;border:1.5px solid var(--line-2);color:var(--text);
  font-size:14px;font-weight:600;white-space:nowrap;background:var(--bg)}
.chip.on{background:#FBE6E9;color:var(--orange);border-color:var(--orange)}

/* sort/filter row */
.tool-row{display:flex;gap:11px;padding:12px 18px 2px}
.tool-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;
  border:1.5px solid var(--line-2);border-radius:30px;padding:12px;font-size:14px;font-weight:600;color:var(--text);background:var(--bg)}
.tool-btn.active{border-color:var(--orange);color:var(--orange)}
.tool-btn svg{width:16px;height:16px}

/* product GRID */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:14px 18px 8px}
.card{position:relative;animation:cardin .38s var(--ease) both}
@keyframes cardin{from{opacity:0;translate:0 10px}to{opacity:1;translate:0 0}}
.card .ph-wrap{position:relative;border-radius:var(--radius);overflow:hidden;background:var(--surface)}
.card .ph{aspect-ratio:1/1;object-fit:contain;width:100%;background:#fff;transition:scale .5s var(--ease)}
.card:active .ph{scale:1.03}
.badge{position:absolute;top:10px;left:10px;background:var(--orange);color:#fff;
  font-size:11px;font-weight:600;padding:5px 11px;border-radius:20px;letter-spacing:.01em}
.fav{position:absolute;top:9px;right:9px;width:34px;height:34px;border-radius:50%;
  background:rgba(255,255,255,.85);backdrop-filter:blur(4px);display:grid;place-items:center;
  box-shadow:0 2px 8px rgba(0,0,0,.12)}
.fav svg{width:18px;height:18px;fill:none;stroke:#54545A;stroke-width:1.9}
.fav.on svg{fill:var(--orange);stroke:var(--orange)}
.card .info{padding:11px 2px 2px}
.card .cond{font-size:12px;letter-spacing:.01em;color:var(--orange);font-weight:600}
.card .nm{margin:4px 0 0;font-size:14px;font-weight:500;line-height:1.3;color:var(--ink);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:37px}
.card .pr{margin-top:6px;font-weight:700;font-size:16px;color:var(--ink)}
.card .brand-line{font-size:12px;color:var(--muted);margin-top:2px}

.empty{text-align:center;color:var(--muted);padding:56px 30px;font-size:14px}
.empty b{display:block;color:var(--ink);font-size:17px;font-weight:700;margin-bottom:6px}

/* ---------------- DETAIL ---------------- */
.detail-hero{position:relative;background:var(--surface)}
.detail-img{aspect-ratio:1/1;object-fit:contain;width:100%;background:#fff}
.detail-back,.detail-top-actions{position:absolute;top:calc(env(safe-area-inset-top) + 12px);z-index:5}
.detail-back{left:14px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.9);
  display:grid;place-items:center;box-shadow:0 2px 8px rgba(0,0,0,.12);color:var(--ink)}
.detail-top-actions{right:14px;display:flex;gap:9px}
.detail-top-actions .icon-btn{background:rgba(255,255,255,.9);box-shadow:0 2px 8px rgba(0,0,0,.12)}
.dots{position:absolute;bottom:14px;left:0;right:0;display:flex;gap:6px;justify-content:center}
.dots i{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.6);box-shadow:0 1px 3px rgba(0,0,0,.2)}
.dots i.on{background:var(--orange);width:22px;border-radius:4px}
.detail-body{padding:20px 18px 10px}
.price-row{display:flex;align-items:center;justify-content:space-between}
.big-price{font-weight:700;font-size:28px;color:var(--ink)}
.price-row .fav{position:static;background:var(--surface);box-shadow:none;width:42px;height:42px}
.detail-title{margin:12px 0 2px;font-size:21px;font-weight:600;line-height:1.3;color:var(--ink)}
.brand-pill{display:inline-flex;align-items:center;gap:6px;margin-top:10px;background:var(--surface);
  border-radius:30px;padding:7px 14px;font-size:13px;color:var(--muted);font-weight:500}
.brand-pill b{color:var(--orange);font-weight:700}
.lbl{font-size:17px;font-weight:700;color:var(--ink);margin:24px 0 12px}
.cond-opt{display:flex;align-items:center;gap:13px;border:1.5px solid var(--orange);border-radius:var(--radius);
  padding:12px;background:#FBE6E9}
.cond-opt .thumb{width:54px;height:54px;border-radius:11px;overflow:hidden;flex:0 0 auto;object-fit:cover}
.cond-opt .nm{font-weight:700;font-size:15px;color:var(--ink)}
.cond-opt .meta{font-size:13px;color:var(--muted);margin-top:2px}

.spec-tabs{display:flex;background:var(--surface);border-radius:30px;padding:5px;margin-top:8px}
.spec-tab{flex:1;padding:11px;border-radius:30px;font-size:14px;font-weight:600;color:var(--muted);text-align:center}
.spec-tab.on{background:var(--black);color:#fff}
.spec-panel{padding:18px 2px;display:none}
.spec-panel.on{display:block;animation:fade .25s var(--ease)}
.spec-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.spec-grid .k{font-size:12px;color:var(--muted);margin-bottom:4px}
.spec-grid .v{font-size:14px;color:var(--ink);font-weight:600}
.spec-grid .v.brass{color:var(--orange)}
.desc-text{color:var(--text);font-size:14px;line-height:1.6}
.ship-row{display:flex;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--line);font-size:14px}
.ship-row .k{color:var(--muted)}
.ship-row .v{font-weight:600;color:var(--ink)}

/* sales trends (Sibs "No data yet") */
.nodata{border:1px solid var(--line);border-radius:var(--radius);padding:36px 20px;text-align:center;margin-top:10px}
.nodata b{display:block;color:var(--ink);font-weight:700;margin-bottom:4px}
.nodata span{color:var(--muted);font-size:13px}

/* ---------------- STICKY ACTION BAR ---------------- */
.action-bar{position:fixed;left:0;right:0;bottom:0;z-index:70;max-width:var(--maxw);margin:0 auto;
  background:rgba(255,255,255,.97);backdrop-filter:blur(16px);border-top:1px solid var(--line);
  padding:13px 16px calc(13px + env(safe-area-inset-bottom));display:none}
.action-bar.on{display:block}
.action-bar .ab-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
.action-bar .ab-top .meta{font-size:13px;color:var(--muted);font-weight:500}
.action-bar .ab-top .pr{font-weight:700;font-size:20px;color:var(--orange)}
.ab-btns{display:flex;gap:10px}
.btn{flex:1;padding:14px;border-radius:30px;font-weight:700;font-size:15px;text-align:center;
  transition:scale .12s var(--ease)}
.btn:active{scale:.97}
.btn-ghost{border:1.5px solid var(--line-2);color:var(--ink)}
.btn-outline{border:1.5px solid var(--orange);color:var(--orange)}
.btn-solid{background:var(--grad);color:#fff;box-shadow:0 6px 18px rgba(242,78,42,.28)}
.btn-full{width:100%;flex:none}
.btn-block{display:block;width:100%;margin-top:10px}

/* ---------------- SHEET ---------------- */
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:90;opacity:0;pointer-events:none;
  transition:opacity .3s var(--ease)}
.scrim.on{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:100;max-width:var(--maxw);margin:0 auto;background:var(--bg);
  border-top-left-radius:26px;border-top-right-radius:26px;transform:translateY(102%);
  transition:transform .36s var(--ease);max-height:88dvh;display:flex;flex-direction:column;
  box-shadow:0 -10px 40px rgba(0,0,0,.18)}
.sheet.on{transform:translateY(0)}
.sheet-grip{width:42px;height:4px;border-radius:3px;background:var(--line-2);margin:11px auto 0}
.sheet-head{display:flex;align-items:center;justify-content:space-between;padding:16px 22px 6px}
.sheet-head h3{margin:0;font-size:19px;font-weight:700;color:var(--ink)}
.sheet-head .reset{color:var(--orange);font-weight:700;font-size:15px}
.sheet-head .x{font-size:24px;color:var(--muted);line-height:1;padding:4px}
.sheet-body{padding:6px 22px 20px;overflow-y:auto}
.sheet-foot{padding:14px 22px calc(18px + env(safe-area-inset-bottom));border-top:1px solid var(--line)}

.filt-row{display:flex;align-items:center;justify-content:space-between;padding:19px 2px;
  border-bottom:1px solid var(--line);font-size:17px;font-weight:600;color:var(--ink)}
.filt-row .chev{color:var(--faint);font-weight:500}
.opt-row{display:flex;align-items:center;justify-content:space-between;padding:16px 4px;border-bottom:1px solid var(--line)}
.opt-row .rb{width:23px;height:23px;border-radius:50%;border:2px solid var(--line-2)}
.opt-row.on .rb{border-color:var(--orange);background:radial-gradient(circle,var(--orange) 0 42%,transparent 46%)}
.opt-row .label{font-size:16px;color:var(--ink)}

.offer-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
.offer-opt{border:1.5px solid var(--line-2);border-radius:var(--radius);padding:20px 14px;text-align:center}
.offer-opt.on{border-color:var(--orange);background:#FBE6E9}
.offer-opt svg{width:26px;height:26px;margin-bottom:9px;stroke:var(--ink);fill:none;stroke-width:1.6}
.offer-opt.on svg{stroke:var(--orange)}
.offer-opt .t{font-weight:700;font-size:15px;color:var(--ink)}
.field{margin-top:16px}
.field label{display:block;font-size:13px;color:var(--muted);font-weight:600;margin-bottom:8px}
.field input,.field textarea{width:100%;background:var(--bg);border:1.5px solid var(--line-2);border-radius:12px;
  padding:13px 14px;color:var(--ink);font-family:inherit;font-size:15px}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--orange)}

/* checkout */
.co-line{display:flex;gap:13px;padding:14px 0;border-bottom:1px solid var(--line)}
.co-line .th{width:64px;height:64px;border-radius:12px;overflow:hidden;flex:0 0 auto;object-fit:cover}
.co-line .nm{font-size:14px;font-weight:600;line-height:1.3;color:var(--ink)}
.co-line .meta{font-size:12.5px;color:var(--muted);margin-top:3px}
.co-line .pr{margin-left:auto;font-weight:700;align-self:center;color:var(--ink)}
.add-addr{border:1.5px dashed var(--line-2);border-radius:var(--radius);padding:22px;background:var(--surface);
  display:flex;align-items:center;justify-content:center;gap:9px;color:var(--text);font-weight:600}
.notice{background:var(--green-bg);color:#1A8F47;border-radius:12px;padding:14px;font-size:13.5px;
  line-height:1.45;display:flex;gap:10px;font-weight:500}
.notice svg{color:var(--green)}
.toggle{width:48px;height:28px;border-radius:30px;background:var(--line-2);position:relative;flex:0 0 auto;transition:background .2s}
.toggle::after{content:"";position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;
  background:#fff;transition:left .2s var(--ease);box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle.on{background:var(--orange)}
.toggle.on::after{left:23px}
.protect{display:flex;align-items:center;gap:12px;padding:18px 0}
.total-row{display:flex;align-items:center;justify-content:space-between;padding:16px 0 0}
.total-row .lbl2{color:var(--muted);font-weight:500}
.total-row .amt{font-weight:700;font-size:22px;color:var(--orange)}

/* ---------------- NOTIF ---------------- */
.notif{display:flex;gap:14px;padding:16px 18px;border-bottom:1px solid var(--line)}
.notif .av{width:48px;height:48px;border-radius:50%;background:var(--black);flex:0 0 auto;display:grid;
  place-items:center;font-weight:700;color:#fff;font-size:14px}
.notif .body{font-size:14px;line-height:1.4;color:var(--text)}
.notif .time{color:var(--faint);font-size:12px;margin-top:5px}

/* ---------------- PROFIL / HAKKINDA (gradient header) ---------------- */
.prof-grad{background:var(--grad);padding:calc(env(safe-area-inset-top) + 20px) 18px 40px;color:#fff}
.profile-head{display:flex;align-items:center;gap:16px}
.profile-head .av{width:78px;height:78px;border-radius:50%;background:rgba(255,255,255,.18);
  border:2px solid rgba(255,255,255,.5);display:grid;place-items:center;font-weight:700;font-size:30px;color:#fff}
.profile-head .nm{font-weight:700;font-size:22px}
.profile-head .sub{font-size:13px;margin-top:3px;opacity:.92}
.stat-card{margin:-26px 18px 16px;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;
  background:var(--card);box-shadow:0 8px 24px rgba(0,0,0,.08);position:relative;z-index:2}
.stat-top{display:flex;text-align:center;padding:18px 0}
.stat-top .s{flex:1}
.stat-top .n{font-weight:700;font-size:19px;color:var(--ink)}
.stat-top .k{color:var(--muted);font-size:12px;margin-top:3px}
.stat-row{display:flex;justify-content:space-between;padding:15px 18px;border-top:1px solid var(--line);font-size:14px;color:var(--text)}
.stat-row .v{color:var(--orange);font-weight:600}
.about-card{margin:8px 18px 18px;border:1px solid var(--line);border-radius:var(--radius);padding:18px}
.about-card p{margin:0 0 12px;color:var(--text);font-size:14px;line-height:1.6}
.about-card p:last-child{margin:0}
.about-card a{color:var(--orange);text-decoration:none;font-weight:600}

/* search */
.search-wrap{padding:14px 18px 4px}
.search-box{display:flex;align-items:center;gap:10px;background:var(--surface);border-radius:30px;padding:12px 16px}
.search-box svg{width:18px;height:18px;stroke:var(--muted);fill:none;stroke-width:2}
.search-box input{flex:1;border:none;background:none;outline:none;font-family:inherit;font-size:15px;color:var(--ink)}

/* ---------------- BOTTOM NAV (siyah) ---------------- */
.bottom-nav{position:fixed;left:0;right:0;bottom:0;z-index:65;max-width:var(--maxw);margin:0 auto;
  height:calc(var(--nav-h) + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);
  background:var(--black);display:flex;align-items:center}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;color:rgba(255,255,255,.55);
  font-size:10px;font-weight:500;padding-top:6px}
.nav-item svg{width:24px;height:24px;fill:none;stroke:currentColor;stroke-width:1.9}
.nav-item.on{color:#fff}
.nav-cart{margin-top:-24px}
.nav-cart .bub{width:58px;height:58px;border-radius:50%;background:var(--grad);color:#fff;display:grid;
  place-items:center;box-shadow:0 8px 22px rgba(242,78,42,.45);position:relative}
.nav-cart .bub svg{width:26px;height:26px;stroke:#fff;stroke-width:2}
.cart-count{position:absolute;top:-2px;right:-2px;min-width:20px;height:20px;border-radius:11px;background:#fff;
  color:var(--red);font-size:11px;font-weight:700;display:grid;place-items:center;padding:0 5px;border:2px solid var(--black)}

/* toast */
#toast{position:fixed;left:50%;bottom:calc(var(--nav-h) + 22px + env(safe-area-inset-bottom));translate:-50% 0;
  background:var(--ink);color:#fff;font-weight:600;font-size:13.5px;padding:13px 18px;border-radius:30px;z-index:200;
  opacity:0;pointer-events:none;transition:opacity .25s var(--ease),translate .25s var(--ease);max-width:88%;text-align:center}
#toast.on{opacity:1;translate:-50% -6px}

/* ============================================================
   FEED · TikTok/Instagram tarzı tam ekran dikey akış (Öne Çıkanlar)
   ============================================================ */
#app.feed-mode{background:#0E0E10;padding-bottom:0}

#app.feed-mode #view-home{height:100dvh}

.feed{height:100dvh;overflow-y:auto;scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch;
  background:#0E0E10;scrollbar-width:none}
.feed::-webkit-scrollbar{display:none}
.post{height:100dvh;scroll-snap-align:start;scroll-snap-stop:always;position:relative;overflow:hidden;background:#0E0E10}

/* yatay görsel galerisi (gönderi içi swipe) */
.post-media{height:100%;display:flex;overflow-x:auto;scroll-snap-type:x mandatory;scrollbar-width:none}
.post-media::-webkit-scrollbar{display:none}
.pm-slide{min-width:100%;height:100%;scroll-snap-align:center;background:#16130F;display:grid;place-items:center}
.pm-slide img{width:100%;height:100%;object-fit:cover}

/* üst başlık (mağaza) */
.post-top{position:absolute;top:0;left:0;right:0;z-index:4;
  padding:calc(env(safe-area-inset-top) + 58px) 16px 28px;
  background:linear-gradient(180deg,rgba(0,0,0,.5),transparent);pointer-events:none}
.post-seller{display:flex;align-items:center;gap:11px;pointer-events:auto}
.ps-av{width:42px;height:42px;border-radius:50%;background:#0E0E10;border:1.5px solid rgba(255,255,255,.35);
  display:grid;place-items:center;font-weight:700;color:#fff;font-size:16px;flex:0 0 auto}
.ps-name{font-weight:700;font-size:15px;color:#fff;letter-spacing:.01em}
.ps-badge{font-size:11.5px;font-weight:600;color:#39D27F;margin-top:1px;display:flex;align-items:center;gap:4px}

/* sağ aksiyon çubuğu */
.post-rail{position:absolute;right:12px;bottom:190px;z-index:5;display:flex;flex-direction:column;gap:22px;align-items:center}
.rail-btn{display:flex;flex-direction:column;align-items:center;gap:5px;color:#fff}
.rail-btn svg{width:31px;height:31px;fill:none;stroke:#fff;stroke-width:1.7;filter:drop-shadow(0 2px 4px rgba(0,0,0,.4))}
.rail-btn span{font-size:12px;font-weight:600;text-shadow:0 1px 3px rgba(0,0,0,.5)}
.rail-btn.on svg{fill:var(--orange);stroke:var(--orange)}
.rail-btn:active{scale:.9}

/* alt başlık + dots + CTA */
.post-bottom{position:absolute;left:0;right:0;bottom:0;z-index:4;
  padding:0 78px calc(var(--nav-h) + env(safe-area-inset-bottom) + 14px) 16px;
  background:linear-gradient(0deg,rgba(0,0,0,.82) 35%,transparent)}
.post-dots{display:flex;gap:6px;margin-bottom:14px}
.post-dots i{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.45)}
.post-dots i.on{background:var(--orange);width:18px;border-radius:4px}
.pb-cond{font-size:12.5px;font-weight:600;color:var(--orange);letter-spacing:.01em}
.pb-title{margin:5px 0 0;font-size:17px;font-weight:600;color:#fff;line-height:1.3;

.pb-row{display:flex;align-items:center;gap:14px;margin-top:12px}
.pb-price{font-weight:700;font-size:23px;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.5)}
.pb-cta{background:var(--grad);color:#fff;font-weight:700;font-size:14px;padding:11px 20px;border-radius:30px;
  box-shadow:0 6px 18px rgba(242,78,42,.4)}
.pb-cta:active{scale:.96}
.feed-hint{position:absolute;left:0;right:0;bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 4px);
  text-align:center;color:rgba(255,255,255,.5);font-size:11px;z-index:4;pointer-events:none;animation:hintpulse 2s ease-in-out infinite}
@keyframes hintpulse{0%,100%{opacity:.4;translate:0 0}50%{opacity:.8;translate:0 -3px}}

let DATA = [];

/* ---------- VERİ KATMANI (Sheets'e hazır) ---------- */
async function loadData(){
  if(CONFIG.USE_MOCK){
    DATA = MOCK.map(p=>({...p, images:p.images.map((s)=>ph(s,p.type))}));
    return;
  }
  // Google Sheets / Apps Script'ten çek
  try{
    const r = await fetch(CONFIG.SHEET_API + "?action=products");
    const json = await r.json();
    if(json.settings && json.settings.usdTry) CONFIG.USD_TRY = Number(json.settings.usdTry) || CONFIG.USD_TRY;
    DATA = json.products.map(p=>({
      ...p,
      priceUSD:Number(p.priceUSD),
      qty:Number(p.qty||1),
      images:(p.images && p.images.length) ? p.images : [ph(0,p.type)],
      specs:p.specs||{}
    }));
  }catch(e){
    console.error("Sheets yüklenemedi:",e);
    DATA = MOCK.map(p=>({...p, images:p.images.map((s)=>ph(s,p.type))}));
    toast("Bağlantı yok — örnek veri gösteriliyor");
  }
}

/* ---------- FİYAT ---------- */
function fmt(usd){
  return "$"+Math.round(Number(usd)||0).toLocaleString("en-US");
}

/* ---------- KART RENDER ---------- */
function cardHTML(p,i){
  const isFav = state.favs.has(p.id);
  const fresh = p.listedAt >= "2025-06-23";
  return `<article class="card" style="animation-delay:${i*40}ms" onclick="openDetail('${p.id}')">
    <div class="ph-wrap">
      <img class="ph" src="${p.images[0]}" alt="${p.name}" loading="lazy"/>
      ${fresh?'<span class="badge">Yeni listelendi</span>':''}
      <button class="fav ${isFav?'on':''}" onclick="event.stopPropagation();toggleFav('${p.id}',this)" aria-label="Favori">
        <svg viewBox="0 0 24 24"><path d="M12 21s-7-4.6-9.3-9C1 9 2.4 5.5 6 5.5c2 0 3.2 1.2 4 2.3.8-1.1 2-2.3 4-2.3 3.6 0 5 3.5 3.3 6.5C19 16.4 12 21 12 21z"/></svg>
      </button>
    </div>
    <div class="info">
      <div class="cond">${p.condition}</div>
      <h3 class="nm">${p.name}</h3>
      <div class="pr">${fmt(p.priceUSD)}</div>
      <div class="brand-line">${p.brand} · ${p.qty} adet</div>

}

/* ---------- LİSTELEME ---------- */
function visibleProducts(){
  let list = DATA.slice();
  if(state.cat!=="all") list = list.filter(p=>p.type===state.cat);
  const f = state.filter;
  if(f.brand) list = list.filter(p=>p.brand===f.brand);
  if(f.condition) list = list.filter(p=>p.condition===f.condition);
  if(f.max) list = list.filter(p=>p.priceUSD*(state.cur==="TRY"?CONFIG.USD_TRY:1) <= f.max);
  if(f.favOnly) list = list.filter(p=>state.favs.has(p.id));
  switch(state.sort){
    case "low": list.sort((a,b)=>a.priceUSD-b.priceUSD);break;
    case "high":list.sort((a,b)=>b.priceUSD-a.priceUSD);break;
    case "new": list.sort((a,b)=>b.listedAt.localeCompare(a.listedAt));break;
    case "old": list.sort((a,b)=>a.listedAt.localeCompare(b.listedAt));break;
  }
  return list;
}

function renderHome(){
  // Öne çıkanlar akışı: önce premium/yeni parçalar
  const list = DATA.slice().sort((a,b)=>{
    const pa = a.priceUSD>1000?1:0, pb = b.priceUSD>1000?1:0;
    if(pb-pa) return pb-pa;
    return b.listedAt.localeCompare(a.listedAt);
  });
  const feed = document.getElementById("feed");
  feed.innerHTML = list.map(postHTML).join("") +
    `<div class="feed-hint">↑ kaydır</div>`;

function feedScroll(el){
  const i = Math.round(el.scrollLeft / el.clientWidth);

}
function railFav(id,el){
  toggleFav(id);

}
function feedOffer(id){
  state.current = DATA.find(p=>p.id===id);

function shareItem(id){
  const p = DATA.find(x=>x.id===id);
  const data = {title:"Q8 · "+(p?p.name:""), text:p?`${p.name} — ${fmt(p.priceUSD)}`:"", url:location.href};

  const payload = { action:"order", items:items.map(p=>({id:p.id,name:p.name,priceUSD:p.priceUSD})),
    insurance:state.insurance, currency:"USD", kod:u.kod||"", customer:u.ad||"", ts:new Date().toISOString() };
  if(!CONFIG.USE_MOCK){
    try{ await fetch(CONFIG.SHEET_API,{method:"POST",body:JSON.stringify(payload)}); }catch(e){}
  }
  setTimeout(()=>{
    state.cart=[]; state.insurance=false; saveCart();
    toast("Sipariş alındı ✓ En kısa sürede dönüş yapılacak");
    go("home");
  },700);
}

/* ---------- TEKLİF ---------- */
function openOffer(){
  const p=state.current;
  state.tmpOffer={type:null};
  document.getElementById("offerBody").innerHTML = `
    <div class="co-line" style="border:none;padding-top:0">
      <img class="th" src="${p.images[0]}"/>
      <div><div class="nm">${p.name}</div><div class="meta">${p.condition} · ${p.brand}</div>
      <div class="pr" style="margin-top:4px;color:var(--brass)">${fmt(p.priceUSD)}</div></div>
    </div>
    <p style="color:var(--muted);font-size:13.5px;margin:6px 0 0">En az bir seçenek belirle. İkisini de seçersen paket teklif olur.</p>
    <div class="offer-grid">
      <div class="offer-opt" data-otype="trade" onclick="pickOffer('trade',this)">
        <svg viewBox="0 0 24 24"><path d="M7 7h11l-3-3M17 17H6l3 3"/></svg>
        <div class="t">Takas teklifi</div>
      </div>
      <div class="offer-opt" data-otype="cash" onclick="pickOffer('cash',this)">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><path d="M12 8v8M9.5 9.5h4a1.5 1.5 0 0 1 0 3h-3a1.5 1.5 0 0 0 0 3h4"/></svg>
        <div class="t">Nakit teklif</div>
      </div>
    </div>
    <div id="offerDyn"></div>`;
  openSheet("sheetOffer");
}
function pickOffer(type,el){
  el.classList.toggle("on");
  const active=[...document.querySelectorAll(".offer-opt.on")].map(e=>e.dataset.otype);
  state.tmpOffer.type=active;
  const dyn=document.getElementById("offerDyn");
  let html="";
  if(active.includes("cash")){
    html+=`<div class="field"><label>Nakit teklifin</label>
      <input class="mono" id="offerCash" inputmode="numeric" placeholder="${fmt(Math.round(state.current.priceUSD*0.9))}"/></div>`;
  }
  if(active.includes("trade")){
    html+=`<div class="field"><label>Takas etmek istediğin ürün</label>
      <textarea id="offerTrade" rows="3" placeholder="Marka, model, durum…"></textarea></div>`;
  }
  if(active.length){
    html+=`<div class="field"><label>Not (opsiyonel)</label>
      <textarea id="offerNote" rows="2" placeholder="Eklemek istediklerin…"></textarea></div>`;
  }
  dyn.innerHTML=html;
}
async function sendOffer(){
  const t=state.tmpOffer.type;
  if(!t||!t.length){ toast("En az bir teklif türü seç"); return; }
  const u=getUser()||{};
  const payload={action:"offer", productId:state.current.id, types:t,
    cash:document.getElementById("offerCash")?.value||null,
    trade:document.getElementById("offerTrade")?.value||null,
    note:document.getElementById("offerNote")?.value||null,
    kod:u.kod||"", customer:u.ad||"", ts:new Date().toISOString()};
  if(!CONFIG.USE_MOCK){ try{ await fetch(CONFIG.SHEET_API,{method:"POST",body:JSON.stringify(payload)});}catch(e){} }
  closeSheet();
  toast("Teklifin gönderildi ✓");
}

/* ---------- SIRALA / FİLTRE SHEET ---------- */
const SORTS=[["new","En yeni → en eski"],["old","En eski → en yeni"],["low","Fiyat (artan)"],["high","Fiyat (azalan)"]];
function openSort(){
  state.tmpSort=state.sort;
  document.getElementById("sortBody").innerHTML = SORTS.map(([k,l])=>`
    <div class="opt-row ${state.sort===k?'on':''}" data-sort="${k}" onclick="pickSort('${k}',this)">
      <span class="label">${l}</span><span class="rb"></span></div>`).join("");
  openSheet("sheetSort");
}
function pickSort(k,el){
  state.tmpSort=k;
  document.querySelectorAll("#sortBody .opt-row").forEach(r=>r.classList.toggle("on",r===el));
}
function applySort(){ state.sort=state.tmpSort; document.getElementById("sortBtn").classList.toggle("active",state.sort!=="new"); closeSheet(); renderShop(); }

let filterStep="root";
function openFilter(){
  state.tmpFilter=JSON.parse(JSON.stringify(state.filter));
  filterStep="root"; renderFilterRoot(); openSheet("sheetFilter");
}
function renderFilterRoot(){
  const f=state.tmpFilter;
  const active = f.brand||f.condition||f.max||f.favOnly;
  document.getElementById("filterBody").innerHTML = `
    <p style="color:var(--muted);font-size:13.5px;margin:4px 0 8px">${active?'Filtreler uygulanıyor':'Tüm ürünler gösteriliyor'}</p>
    <div class="filt-row" onclick="filterSub('brand')"><span>Marka</span><span class="chev">${f.brand||'›'}</span></div>
    <div class="filt-row" onclick="filterSub('condition')"><span>Durum</span><span class="chev">${f.condition||'›'}</span></div>
    <div class="filt-row" onclick="filterSub('price')"><span>Fiyat aralığı</span><span class="chev">${f.max?fmt(f.max/(state.cur==='TRY'?CONFIG.USD_TRY:1)):'›'}</span></div>
    <div class="filt-row" style="border:none"><span>Sadece favoriler</span>
      <div class="toggle ${f.favOnly?'on':''}" onclick="event.stopPropagation();state.tmpFilter.favOnly=!state.tmpFilter.favOnly;renderFilterRoot()"></div></div>`;
}
function filterSub(kind){
  const f=state.tmpFilter;
  let opts=[];
  if(kind==="brand"){ opts=[...new Set(DATA.filter(p=>state.cat==='all'||p.type===state.cat).map(p=>p.brand))]; }
  if(kind==="condition"){ opts=["Yeni","Çok iyi","İyi"]; }
  if(kind==="price"){ opts=[200,500,1000,3000,10000]; }
  const cur = kind==="brand"?f.brand : kind==="condition"?f.condition : null;
  document.getElementById("filterBody").innerHTML = `
    <div class="filt-row" style="border:none;cursor:pointer" onclick="renderFilterRoot()">
      <span style="color:var(--brass)">‹ Geri</span></div>
    ${opts.map(o=>{
      const label = kind==="price" ? "≤ "+fmt(o) : o;
      const on = kind==="price" ? f.max===o*(state.cur==='TRY'?CONFIG.USD_TRY:1) : cur===o;
      return `<div class="opt-row ${on?'on':''}" onclick="setFilter('${kind}','${o}',this)">
        <span class="label">${label}</span><span class="rb"></span></div>`;
    }).join("")}`;
}
function setFilter(kind,val){
  const f=state.tmpFilter;
  if(kind==="brand") f.brand = f.brand===val?null:val;
  if(kind==="condition") f.condition = f.condition===val?null:val;
  if(kind==="price"){ const v=Number(val)*(state.cur==='TRY'?CONFIG.USD_TRY:1); f.max = f.max===v?null:v; }
  renderFilterRoot();
}
function applyFilter(){
  state.filter=JSON.parse(JSON.stringify(state.tmpFilter));
  const active = state.filter.brand||state.filter.condition||state.filter.max||state.filter.favOnly;
  document.getElementById("filterBtn").classList.toggle("active",!!active);
  closeSheet(); renderShop();
}
function resetFilter(){ state.tmpFilter={brand:null,condition:null,max:null,favOnly:false}; renderFilterRoot(); }

/* ---------- SHEET kontrol ---------- */
function openSheet(id){ document.getElementById("scrim").classList.add("on"); document.getElementById(id).classList.add("on"); }
function closeSheet(){ document.getElementById("scrim").classList.remove("on");
  document.querySelectorAll(".sheet").forEach(s=>s.classList.remove("on")); }

/* ---------- ARAMA ---------- */
function renderSearch(q){
  q=(q||"").trim().toLowerCase();
  const list = q ? DATA.filter(p=>(p.name+p.brand+p.model).toLowerCase().includes(q)) : DATA;
  document.getElementById("searchGrid").innerHTML = list.length
    ? list.map((p,i)=>cardHTML(p,i)).join("")
    : `<div class="empty" style="grid-column:1/-1"><b>Bulunamadı</b>Başka bir kelime dene.</div>`;
}

/* ---------- BİLDİRİM ---------- */
const NOTIFS=[
  ["E","Rolex Datejust 36 yeniden listelendi — kaçırmadan göz at.","19 saat önce"],
  ["E","Yeni gelen: Tissot PRX Powermatic 80 mavi. Sınırlı stok.","1 gün önce"],
  ["E","Ray-Ban Aviator stoğu güncellendi.","2 gün önce"],
  ["E","Persol 714 Steve McQueen tek adet kaldı.","3 gün önce"]
];
function renderNotif(){
  document.getElementById("notifList").innerHTML = NOTIFS.map(([a,b,t])=>`
    <div class="notif"><div class="av">${a}</div>
      <div><div class="body">${b}</div><div class="time">${t}</div></div></div>`).join("");
  document.querySelector('[data-nav="notif"] .dot')?.remove();
}

/* ---------- NAVİGASYON ---------- */
function go(view){
  if(["home","shop","favs","detail","search","cart","notif","about"].includes(view)){
    if(view!=="detail" && state.view!=="detail") state.prevView=state.view;
    if(state.view==="detail" && view==="detail"){} else if(view==="detail") state.prevView=state.view;
  }
  state.view=view;
  document.querySelectorAll(".view").forEach(v=>v.classList.remove("on"));
  document.getElementById("view-"+view).classList.add("on");
  document.getElementById("actionBar").classList.toggle("on",view==="detail");
  document.getElementById("app").classList.toggle("feed-mode",view==="home");
  // tab senkron
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("on",t.dataset.view===view));
  // bottom nav senkron
  const navMap={home:"home",shop:"home",favs:"home",about:"about",search:"search",cart:"cart",notif:"notif"};
  document.querySelectorAll(".nav-item").forEach(n=>n.classList.toggle("on",n.dataset.nav===navMap[view]));
  // render
  if(view==="home")renderHome();
  if(view==="shop")renderShop();
  if(view==="favs")renderFavs();
  if(view==="about")renderAbout();
  if(view==="cart")renderCart();
  if(view==="notif")renderNotif();
  if(view==="search")renderSearch(document.getElementById("searchInput").value);
  window.scrollTo({top:0,behavior:"instant"});
}

/* ---------- TOAST ---------- */
let toastT;
function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("on");
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("on"),2200);
}

/* ---------- OLAY BAĞLAMA ---------- */
function bind(){
  document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>go(t.dataset.view));
  document.querySelectorAll(".nav-item").forEach(n=>n.onclick=()=>go(n.dataset.nav));
  document.querySelectorAll("#chips .chip").forEach(c=>c.onclick=()=>{
    document.querySelectorAll("#chips .chip").forEach(x=>x.classList.remove("on"));
    c.classList.add("on"); state.cat=c.dataset.cat; renderShop();
  });
  document.getElementById("sortBtn").onclick=openSort;
  document.getElementById("filterBtn").onclick=openFilter;
  document.getElementById("searchInput").addEventListener("input",e=>renderSearch(e.target.value));
}
function rerenderAll(){
  if(state.view==="home")renderHome();
  if(state.view==="shop")renderShop();
  if(state.view==="favs")renderFavs();
  if(state.view==="cart")renderCart();
  if(state.view==="search")renderSearch(document.getElementById("searchInput").value);
  if(state.view==="detail"&&state.current)openDetail(state.current.id);
}

/* ---------- GİRİŞ / BAŞLAT (kapalı portal) ---------- */
function getUser(){ try{ return JSON.parse(localStorage.getItem("q8_user")||"null"); }catch(e){ return null; } }
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

async function startApp(){
  await loadData();
  bind();
  updateCartBadge();
  renderHome();
  document.getElementById("app").classList.add("feed-mode");
  document.getElementById("app").hidden=false;
  setTimeout(()=>{ document.getElementById("splash").classList.add("hide"); },700);
}
function showLogin(){
  document.getElementById("splash").classList.add("hide");
  document.getElementById("app").hidden=true;
  document.getElementById("login").classList.add("on");
  setTimeout(()=>{ const k=document.getElementById("loginKod"); if(k) k.focus(); },200);
}
async function doLogin(){
  const kod=document.getElementById("loginKod").value.trim();
  const sifre=document.getElementById("loginSifre").value;
  const err=document.getElementById("loginErr"); err.textContent="";
  if(!kod||!sifre){ err.textContent="Kod ve şifre gir"; return; }
  const btn=document.getElementById("loginBtn"); btn.textContent="Kontrol ediliyor…"; btn.disabled=true;
  let j=null;
  try{ const r=await fetch(CONFIG.SHEET_API,{method:"POST",body:JSON.stringify({action:"login",kod,sifre})}); j=await r.json(); }
  catch(e){ err.textContent="Bağlantı hatası — tekrar dene"; btn.textContent="Giriş"; btn.disabled=false; return; }
  if(!j||!j.ok){ err.textContent=(j&&j.error)||"Giriş başarısız"; btn.textContent="Giriş"; btn.disabled=false; return; }
  localStorage.setItem("q8_user",JSON.stringify(j.user||{kod}));
  btn.textContent="Giriş"; btn.disabled=false;
  document.getElementById("login").classList.remove("on");
  document.getElementById("splash").classList.remove("hide");
  await startApp();
}

async function boot(){
  if(getUser()){ await startApp(); }
  else { showLogin(); }
}
document.getElementById("loginBtn").onclick=doLogin;
document.getElementById("loginSifre").addEventListener("keydown",e=>{ if(e.key==="Enter") doLogin(); });
document.getElementById("loginKod").addEventListener("keydown",e=>{ if(e.key==="Enter") document.getElementById("loginSifre").focus(); });
boot();

/* ---------- SERVICE WORKER (PWA) ---------- */
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("sw.js").catch(()=>{});
  });
}

</script>
